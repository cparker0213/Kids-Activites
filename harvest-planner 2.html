<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harvest Family Planner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #e8f4f8;
    --deep: #1a2e3b;
    --warm: #c8773a;
    --warm-light: #f5e6d8;
    --green: #3d7a5e;
    --green-light: #e0ede7;
    --sand: #f2ead8;
    --text: #1a2e3b;
    --muted: #6b8090;
    --border: #d4dde3;
    --hot: #c0392b;
    --hot-light: #fdecea;
    --rain: #4a6fa5;
    --rain-light: #eaf0f8;
    --card-bg: #ffffff;
    --bg: #f4f7f9;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: var(--deep);
    padding: 28px 32px 24px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
  }

  .header-left h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.9rem;
    color: #ffffff;
    line-height: 1.1;
    letter-spacing: -0.02em;
  }

  .header-left p {
    font-size: 0.8rem;
    color: #8fa8b8;
    margin-top: 5px;
    font-weight: 300;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .week-label {
    font-size: 0.75rem;
    color: #8fa8b8;
    text-align: right;
    font-weight: 300;
  }

  .legend {
    display: flex;
    gap: 16px;
    padding: 12px 32px;
    background: var(--deep);
    border-top: 1px solid #2a3f50;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.7rem;
    color: #8fa8b8;
    font-weight: 300;
    letter-spacing: 0.03em;
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .main {
    padding: 24px 24px 48px;
    max-width: 1200px;
    margin: 0 auto;
  }

  #loading {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
    font-size: 0.9rem;
    font-weight: 300;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--warm);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .week-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 10px;
  }

  @media (max-width: 900px) {
    .week-grid { grid-template-columns: repeat(3, 1fr); }
    header { flex-direction: column; align-items: flex-start; }
  }

  @media (max-width: 540px) {
    .week-grid { grid-template-columns: 1fr; }
    .main { padding: 16px 16px 48px; }
  }

  .day-card {
    background: var(--card-bg);
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    transition: box-shadow 0.15s;
  }

  .day-card:hover {
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }

  .day-card.today .day-header {
    background: var(--warm);
  }

  .day-card.today .day-name,
  .day-card.today .day-date {
    color: #fff;
  }

  .day-header {
    background: var(--deep);
    padding: 12px 14px 10px;
  }

  .day-name {
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #8fa8b8;
  }

  .day-date {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    color: #ffffff;
    line-height: 1;
    margin-top: 2px;
  }

  .day-weather {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .temp-range {
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--text);
  }

  .temp-range span {
    color: var(--muted);
    font-weight: 300;
    font-size: 0.75rem;
  }

  .condition-badge {
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .badge-normal { background: var(--green-light); color: var(--green); }
  .badge-hot { background: var(--hot-light); color: var(--hot); }
  .badge-rain { background: var(--rain-light); color: var(--rain); }
  .badge-pool { background: #e3f0f8; color: #2565a3; }

  .blocks {
    padding: 10px 12px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
  }

  .time-block {
    border-radius: 8px;
    padding: 9px 11px;
    border: 1px solid transparent;
  }

  .block-morning { background: #fdf9f3; border-color: #ecdfc8; }
  .block-afternoon { background: #f3f8f3; border-color: #c8dcc8; }
  .block-evening { background: #f3f4fa; border-color: #c8cce8; }

  .block-label {
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .block-morning .block-label { color: #a07830; }
  .block-afternoon .block-label { color: #3d7a5e; }
  .block-evening .block-label { color: #4a4a90; }

  .block-kids {
    font-size: 0.62rem;
    color: var(--muted);
    margin-bottom: 5px;
    font-weight: 300;
  }

  .block-activity {
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--text);
    line-height: 1.35;
  }

  .block-note {
    font-size: 0.68rem;
    color: var(--muted);
    margin-top: 3px;
    font-weight: 300;
    line-height: 1.3;
  }

  .block-photo {
    width: 100%;
    height: 75px;
    object-fit: cover;
    border-radius: 6px;
    margin-top: 7px;
    display: block;
    background: var(--border);
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .block-photo.loaded {
    opacity: 1;
  }

  .no-kids {
    font-size: 0.72rem;
    color: #b0bec5;
    font-style: italic;
    font-weight: 300;
  }

  .rain-pct {
    font-size: 0.68rem;
    color: var(--rain);
    font-weight: 300;
  }

  .error-msg {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .updated-note {
    text-align: center;
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 20px;
    font-weight: 300;
    letter-spacing: 0.03em;
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Harvest Family Planner</h1>
    <p>Northlake, Texas &mdash; Activity Guide</p>
  </div>
  <div class="week-label" id="week-range"></div>
</header>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#8fa8b8"></div>Morning 8–11am</div>
  <div class="legend-item"><div class="legend-dot" style="background:#3d7a5e"></div>Afternoon 2–4:30pm</div>
  <div class="legend-item"><div class="legend-dot" style="background:#4a4a90"></div>Evening 4:30–7pm</div>
</div>

<div class="main">
  <div id="loading"><div class="spinner"></div>Fetching forecast for Northlake...</div>
  <div id="content" style="display:none">
    <div class="week-grid" id="week-grid"></div>
    <div class="updated-note" id="updated-note"></div>
  </div>
  <div id="error" style="display:none" class="error-msg">Unable to load weather data. Please try again.</div>
</div>

<script>
// ── Config ──────────────────────────────────────────────────────────────
const LAT = 33.0762;
const LON = -97.2636;
const HEAT_THRESHOLD = 95; // °F
const UNSPLASH_KEY = 'kIiAfUKgXNTzkA2au3ZNwmo_rUwvAsLPcXvXWZI6aHg';

// Photo cache to avoid duplicate API calls
const photoCache = {};

// Map activity keywords to better Unsplash search terms
function getPhotoQuery(activityText) {
  const a = activityText.toLowerCase();
  if (a.includes('trail') || a.includes('scooter')) return 'family trail walk nature';
  if (a.includes('playground')) return 'children playground outdoor';
  if (a.includes('farm')) return 'family farm garden children';
  if (a.includes('bike')) return 'family bike ride path';
  if (a.includes('lake')) return 'lake path walk family';
  if (a.includes('volleyball') || a.includes('sand')) return 'children playing sand outdoor';
  if (a.includes('pool') || a.includes('splash')) return 'children splash pad pool summer';
  if (a.includes('picnic')) return 'family picnic park outdoor';
  if (a.includes('basketball') || a.includes('court')) return 'kids basketball court outdoor';
  if (a.includes('backyard') || a.includes('cul-de-sac')) return 'children backyard play chalk bubbles';
  if (a.includes('craft') || a.includes('sensory')) return 'children craft art play indoor';
  if (a.includes('coffee') || a.includes('farmhouse')) return 'cozy coffee shop morning';
  if (a.includes('library') || a.includes('reading')) return 'children library reading books';
  if (a.includes('lego') || a.includes('build')) return 'children building blocks play indoor';
  if (a.includes('walk') || a.includes('neighborhood')) return 'family neighborhood morning walk';
  if (a.includes('dinner') || a.includes('lawn')) return 'family outdoor dinner picnic lawn';
  return 'family outdoor activity children';
}

async function fetchPhoto(query) {
  if (photoCache[query]) return photoCache[query];
  try {
    const url = `https://api.unsplash.com/search/photos?query=${encodeURIComponent(query)}&per_page=5&orientation=landscape&client_id=${UNSPLASH_KEY}`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.results && data.results.length > 0) {
      // Pick a random result from top 5 for variety
      const idx = Math.floor(Math.random() * Math.min(5, data.results.length));
      const photoUrl = data.results[idx].urls.small;
      photoCache[query] = photoUrl;
      return photoUrl;
    }
  } catch (e) {}
  return null;
}

// Kid schedule helper
function getKidsAvailable(date) {
  const dow = date.getDay(); // 0=Sun,1=Mon,...,6=Sat
  const isWeekend = dow === 0 || dow === 6;
  if (isWeekend) return { morning: ['Lera (7)', 'Sylvi (4)', 'Emme (20m)'], afternoon: ['Lera (7)', 'Sylvi (4)', 'Emme (20m)'], evening: ['Lera (7)', 'Sylvi (4)', 'Emme (20m)'] };
  // Weekday
  const morning = [];
  const afternoon = [];
  const evening = ['Lera (7)', 'Sylvi (4)', 'Emme (20m)'];

  // 7yo: school 7am-3:30pm (not available morning/early afternoon)
  // 4yo: daycare Mon+Wed 9am-2:30pm; otherwise home
  // 20mo: home always, naps 11am-2pm

  // Morning block: 8-11am
  // 7yo: at school — no
  // 20mo: awake — yes
  if (dow === 1 || dow === 3) {
    // Mon or Wed: 4yo at daycare
    morning.push('Emme (20m)');
  } else {
    // Tue, Thu, Fri: 4yo home
    morning.push('Sylvi (4)', 'Emme (20m)');
  }

  // Afternoon block: 2-4:30pm
  // 7yo: home after 3:30 — not in this block
  // 20mo: nap ends ~2pm — available after 2
  // 4yo: Mon/Wed pickup 2:30, otherwise home after daycare drop (Tue/Thu/Fri available all day)
  if (dow === 1 || dow === 3) {
    // Mon/Wed: 4yo back by 2:30 — call it available
    afternoon.push('Sylvi (4)', 'Emme (20m)');
  } else {
    afternoon.push('Sylvi (4)', 'Emme (20m)');
  }

  return { morning, afternoon, evening };
}

function getWeekLabel(dates) {
  const opts = { month: 'short', day: 'numeric' };
  return `${dates[0].toLocaleDateString('en-US', opts)} – ${dates[6].toLocaleDateString('en-US', opts)}, ${dates[6].getFullYear()}`;
}

// Weather condition interpretation
function interpretWeather(maxTempF, precipProb, windSpeed) {
  if (precipProb >= 50) return { label: 'Rain likely', cls: 'badge-rain', mode: 'rain' };
  if (maxTempF >= HEAT_THRESHOLD) return { label: 'Extreme heat', cls: 'badge-hot', mode: 'hot' };
  if (maxTempF >= 85) return { label: 'Warm', cls: 'badge-normal', mode: 'warm' };
  return { label: 'Good', cls: 'badge-normal', mode: 'good' };
}

// Activity logic
function getActivity(block, kids, mode, precipProb, maxTempF) {
  if (kids.length === 0) return null;

  const hasInfant = kids.some(k => k.includes('20m'));
  const hasFour = kids.some(k => k.includes('(4)'));
  const hasSeven = kids.some(k => k.includes('(7)'));
  const allThree = hasInfant && hasFour && hasSeven;

  if (mode === 'rain') {
    const indoorActivities = [
      { act: 'Indoor craft or sensory play at home', note: 'Finger painting, playdough, or water table in the garage' },
      { act: 'Farmer\'s Market or Farmhouse Coffee run', note: 'Quick outing if rain is light; Harvest\'s covered areas work well' },
      { act: 'Library or indoor reading time', note: 'Keller Public Library has a strong kids section' },
      { act: 'Build and play day at home', note: 'LEGO for the older kids; stacking toys and tunnels for the baby' },
    ];
    const i = (hasInfant ? 0 : 1) + (block === 'morning' ? 0 : block === 'afternoon' ? 1 : 2);
    return indoorActivities[i % indoorActivities.length];
  }

  if (mode === 'hot') {
    if (block === 'morning') {
      // Before heat peaks — outdoor still viable early
      if (maxTempF >= 100) return { act: 'Quick neighborhood walk or park visit', note: 'Go early (before 9am); the linear park trail stays shaded along parts of the route' };
      return { act: 'Neighborhood playground at Central Park', note: 'Morning is the best window before heat peaks — bring water and sunscreen' };
    }
    if (block === 'afternoon') {
      return { act: 'Pool day at Harvest', note: 'Water play area is ideal for the baby; three pools across the community — go to the one with the splash pad for the little ones' };
    }
    if (block === 'evening') {
      return { act: 'Evening walk or bike ride on the trail', note: 'Temps usually drop meaningfully after 6:30pm in summer — linear trail or lake loop works well' };
    }
  }

  // Good or warm conditions
  const activities = {
    morning: [
      { act: 'Central Park trail walk or scooter ride', note: '1.5-mile loop; stroller-friendly. Good for all ages — older kids can scoot ahead', kids: ['all'] },
      { act: 'Neighborhood playground', note: 'Central Park playground has equipment across age ranges including infant-appropriate areas', kids: ['all'] },
      { act: 'Harvest community farm visit', note: 'The farm/garden area is a low-key outing for the younger kids; the 4-year-old especially enjoys it', kids: ['young'] },
      { act: 'Bike ride on the trail', note: 'Older kids on bikes, baby in the stroller or bike seat; flat trail makes it easy', kids: ['all'] },
    ],
    afternoon: [
      { act: 'Lake area exploration', note: '11-acre lake has walking paths around the perimeter; calm and open, good for strollers', kids: ['all'] },
      { act: 'Sand volleyball or open field play', note: 'Sand is great for the baby to dig in while the older kids run; bring snacks', kids: ['all'] },
      { act: 'Pool or splash pad', note: 'Water play area is the right call for the baby and 4-year-old; older kids can handle the main pool', kids: ['all'] },
      { act: 'Playground and picnic at Central Park', note: 'Pack dinner early and make it an outing; the event lawn area works well for a blanket setup', kids: ['all'] },
    ],
    evening: [
      { act: 'Evening lake walk or trail ride', note: 'Best light of the day; cooler air by 6pm most evenings in spring and fall', kids: ['all'] },
      { act: 'Outdoor play and dinner at the event lawn', note: 'Bring portable chairs and dinner; kids can run while adults decompress', kids: ['all'] },
      { act: 'Basketball or open court time', note: '7-year-old can work on dribbling; younger ones run the sidelines', kids: ['all'] },
      { act: 'Backyard or cul-de-sac play', note: 'Low-effort option — chalk, bubbles, or ride-ons for the baby while the older kids free-play', kids: ['all'] },
    ]
  };

  const pool = activities[block];
  // Pick based on day-of-week variation to avoid repetition
  const dayHash = kids.length + (hasInfant ? 2 : 0) + (hasSeven ? 1 : 0);
  return pool[dayHash % pool.length];
}

// ── Main render ──────────────────────────────────────────────────────────
async function loadWeather() {
  try {
    // Get 7-day hourly forecast — temp in F, precipitation probability
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&hourly=temperature_2m,precipitation_probability,windspeed_10m&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max&temperature_unit=fahrenheit&windspeed_unit=mph&timezone=America%2FChicago&forecast_days=7`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('API error');
    const data = await res.json();

    renderWeek(data);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
  }
}

function renderWeek(data) {
  const grid = document.getElementById('week-grid');
  const today = new Date();
  today.setHours(0,0,0,0);

  const dates = data.daily.time.map(t => {
    const d = new Date(t + 'T00:00:00');
    return d;
  });

  document.getElementById('week-range').textContent = getWeekLabel(dates);

  const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  dates.forEach((date, i) => {
    const maxTemp = Math.round(data.daily.temperature_2m_max[i]);
    const minTemp = Math.round(data.daily.temperature_2m_min[i]);
    const precipProb = data.daily.precipitation_probability_max[i];
    const isToday = date.getTime() === today.getTime();

    const cond = interpretWeather(maxTemp, precipProb, 0);
    const kidsAvail = getKidsAvailable(date);

    const card = document.createElement('div');
    card.className = `day-card${isToday ? ' today' : ''}`;

    const blocks = [
      { key: 'morning', label: 'Morning', time: '8 – 11am', cls: 'block-morning' },
      { key: 'afternoon', label: 'Afternoon', time: '2 – 4:30pm', cls: 'block-afternoon' },
      { key: 'evening', label: 'Evening', time: '4:30 – 7pm', cls: 'block-evening' },
    ];

    const blocksHTML = blocks.map(b => {
      const kids = kidsAvail[b.key];
      if (kids.length === 0) {
        return `<div class="time-block ${b.cls}">
          <div class="block-label">${b.label} <span style="font-weight:300;opacity:0.6">${b.time}</span></div>
          <div class="no-kids">No kids available</div>
        </div>`;
      }
      const activity = getActivity(b.key, kids, cond.mode, precipProb, maxTemp);
      const kidsStr = kids.join(', ');
      const photoId = `photo-${i}-${b.key}`;
      return `<div class="time-block ${b.cls}">
        <div class="block-label">${b.label} <span style="font-weight:300;opacity:0.6">${b.time}</span></div>
        <div class="block-kids">${kidsStr}</div>
        <div class="block-activity">${activity.act}</div>
        ${activity.note ? `<div class="block-note">${activity.note}</div>` : ''}
        <img id="${photoId}" class="block-photo" data-query="${getPhotoQuery(activity.act)}" alt="${activity.act}" />
      </div>`;
    }).join('');

    card.innerHTML = `
      <div class="day-header">
        <div class="day-name">${DAY_NAMES[date.getDay()]}${isToday ? ' &mdash; Today' : ''}</div>
        <div class="day-date">${MONTH_NAMES[date.getMonth()]} ${date.getDate()}</div>
      </div>
      <div class="day-weather">
        <div>
          <div class="temp-range">${maxTemp}° <span>/ ${minTemp}°F</span></div>
          ${precipProb > 20 ? `<div class="rain-pct">${precipProb}% rain</div>` : ''}
        </div>
        <div class="condition-badge ${cond.cls}">${cond.label}</div>
      </div>
      <div class="blocks">${blocksHTML}</div>
    `;

    grid.appendChild(card);
  });

  const now = new Date();
  document.getElementById('updated-note').textContent = `Forecast updated ${now.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} at ${now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })} · Open-Meteo · Reload to refresh`;

  // Load photos asynchronously after render
  const photoImgs = document.querySelectorAll('.block-photo[data-query]');
  photoImgs.forEach(async (img) => {
    const query = img.getAttribute('data-query');
    const url = await fetchPhoto(query);
    if (url) {
      img.src = url;
      img.onload = () => img.classList.add('loaded');
    } else {
      img.style.display = 'none';
    }
  });
}

loadWeather();
</script>
</body>
</html>
