<style>

    --warm: #c8773a;
    --warm-light: #f5e6d8;
    --green: #3d7a5e;
    --green-light: #e0ede7;
    --text: #1a2e3b;
    --muted: #6b8090;
    --border: #d4dde3;
    --hot: #c0392b;
    --hot-light: #fdecea;
    --rain: #4a6fa5;
    --rain-light: #eaf0f8;
    --card-bg: #ffffff;
    --bg: #f4f7f9;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

header {
background: #1a2e3b;
padding: 24px 24px 16px;
}
.header-top {
display: flex;
align-items: flex-start;
justify-content: space-between;
gap: 12px;
}
.header-left h1 {
font-family: ‘DM Serif Display’, serif;
font-size: 1.7rem;
color: #fff;
line-height: 1.1;
letter-spacing: -0.02em;
}
.header-left p {
font-size: 0.72rem;
color: #8fa8b8;
margin-top: 4px;
font-weight: 300;
letter-spacing: 0.04em;
text-transform: uppercase;
}
.last-updated {
font-size: 0.68rem;
color: #8fa8b8;
text-align: right;
font-weight: 300;
white-space: nowrap;
margin-top: 4px;
}
.week-range-label {
font-size: 0.7rem;
color: #8fa8b8;
margin-top: 10px;
font-weight: 300;
}

.legend {
display: flex;
gap: 14px;
padding: 10px 24px;
background: #1a2e3b;
border-top: 1px solid #2a3f50;
flex-wrap: wrap;
}
.legend-item {
display: flex;
align-items: center;
gap: 5px;
font-size: 0.68rem;
color: #8fa8b8;
font-weight: 300;
}
.legend-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

.main { padding: 20px 16px 60px; max-width: 1200px; margin: 0 auto; }

#loading { text-align: center; padding: 80px 20px; color: var(–muted); font-size: 0.9rem; font-weight: 300; }
.spinner { width: 28px; height: 28px; border: 2px solid var(–border); border-top-color: var(–warm); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
@keyframes spin { to { transform: rotate(360deg); } }

.week-grid {
display: grid;
grid-template-columns: repeat(7, 1fr);
gap: 10px;
}
@media (max-width: 900px) { .week-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 540px) { .week-grid { grid-template-columns: 1fr; } .main { padding: 14px 12px 60px; } }

.day-card {
background: var(–card-bg);
border-radius: 10px;
overflow: hidden;
border: 1px solid var(–border);
display: flex;
flex-direction: column;
transition: box-shadow 0.15s;
}
.day-card:hover { box-shadow: 0 4px 18px rgba(0,0,0,0.08); }
.day-card.today .day-header { background: var(–warm); }
.day-card.today .day-name, .day-card.today .day-date { color: #fff; }

.day-header { background: var(–deep); padding: 10px 12px 9px; }
.day-name { font-size: 0.62rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: #8fa8b8; }
.day-date { font-family: ‘DM Serif Display’, serif; font-size: 1.4rem; color: #fff; line-height: 1; margin-top: 2px; }

.day-weather {
padding: 9px 12px;
border-bottom: 1px solid var(–border);
display: flex;
align-items: center;
justify-content: space-between;
gap: 6px;
}
.temp-range { font-size: 0.78rem; font-weight: 500; }
.temp-range span { color: var(–muted); font-weight: 300; font-size: 0.72rem; }
.rain-pct { font-size: 0.65rem; color: var(–rain); font-weight: 300; }

.condition-badge {
font-size: 0.62rem; font-weight: 500; letter-spacing: 0.04em;
padding: 3px 7px; border-radius: 20px; white-space: nowrap; flex-shrink: 0;
}
.badge-normal { background: var(–green-light); color: var(–green); }
.badge-hot { background: var(–hot-light); color: var(–hot); }
.badge-rain { background: var(–rain-light); color: var(–rain); }

.blocks { padding: 9px 10px 10px; display: flex; flex-direction: column; gap: 7px; flex: 1; }

/* Image-as-tile block */
.time-block {
border-radius: 8px;
overflow: hidden;
cursor: pointer;
position: relative;
min-height: 120px;
display: flex;
flex-direction: column;
justify-content: flex-end;
transition: transform 0.15s, box-shadow 0.15s;
background: #2a3a45;
}
.time-block:hover { transform: scale(1.01); box-shadow: 0 4px 16px rgba(0,0,0,0.18); }
.time-block:active { transform: scale(0.99); }

.block-bg-img {
position: absolute;
inset: 0;
width: 100%;
height: 100%;
object-fit: cover;
opacity: 0;
transition: opacity 0.5s ease;
z-index: 0;
}
.block-bg-img.loaded { opacity: 1; }

/* Gradient overlay so text is readable */
.block-overlay {
position: absolute;
inset: 0;
background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.2) 55%, rgba(0,0,0,0.05) 100%);
z-index: 1;
}

/* Colored top accent bar per time of day */
.block-morning .block-overlay { background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.15) 60%, rgba(180,120,30,0.25) 100%); }
.block-afternoon .block-overlay { background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.15) 60%, rgba(40,100,70,0.25) 100%); }
.block-evening .block-overlay { background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.15) 60%, rgba(50,50,120,0.25) 100%); }

.block-content {
position: relative;
z-index: 2;
padding: 8px 10px;
}

.block-label {
font-size: 0.55rem;
font-weight: 600;
letter-spacing: 0.12em;
text-transform: uppercase;
margin-bottom: 2px;
opacity: 0.85;
}
.block-morning .block-label { color: #f5c87a; }
.block-afternoon .block-label { color: #7dd4a8; }
.block-evening .block-label { color: #a0aaee; }

.block-kids { font-size: 0.65rem; color: rgba(255,255,255,0.75); margin-bottom: 3px; font-weight: 300; }
.block-activity { font-size: 0.88rem; font-weight: 600; color: #fff; line-height: 1.25; text-shadow: 0 1px 3px rgba(0,0,0,0.4); }

.block-tap-hint {
font-size: 0.55rem;
color: rgba(255,255,255,0.5);
margin-top: 4px;
font-weight: 300;
display: flex;
align-items: center;
gap: 3px;
}

.no-kids {
position: relative; z-index: 2;
font-size: 0.7rem; color: rgba(255,255,255,0.4);
font-style: italic; font-weight: 300;
padding: 8px 10px;
}
.error-msg { text-align: center; padding: 60px 20px; color: var(–muted); }

/* ── Detail Modal ── */
.modal-overlay {
display: none;
position: fixed; inset: 0;
background: rgba(0,0,0,0.55);
z-index: 100;
align-items: flex-end;
justify-content: center;
padding: 0;
}
.modal-overlay.open { display: flex; }

.modal {
background: #fff;
border-radius: 16px 16px 0 0;
width: 100%;
max-width: 600px;
max-height: 85vh;
overflow-y: auto;
padding: 20px 20px 36px;
animation: slideUp 0.25s ease;
}
@keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.modal-handle {
width: 36px; height: 4px; background: var(–border);
border-radius: 2px; margin: 0 auto 16px;
padding: 12px 0;
background-clip: content-box;
cursor: grab;
}

.modal-top-row {
display: flex;
justify-content: flex-end;
margin-bottom: 4px;
margin-top: -8px;
}

.btn-modal-close {
background: #f0f4f7;
border: none;
border-radius: 50%;
width: 30px;
height: 30px;
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
color: var(–muted);
flex-shrink: 0;
}
.btn-modal-close:hover { background: #e0e8ee; }
.modal-category { font-size: 0.62rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(–muted); margin-bottom: 6px; }
.modal-title { font-family: ‘DM Serif Display’, serif; font-size: 1.4rem; color: var(–text); line-height: 1.2; margin-bottom: 8px; }
.modal-photo { width: 100%; height: 160px; object-fit: cover; border-radius: 10px; margin-bottom: 14px; background: var(–border); }
.modal-address {

.modal-address a { color: var(–warm); text-decoration: none; font-weight: 500; }

.modal-kids { font-size: 0.72rem; color: var(–muted); margin-bottom: 16px; font-weight: 300; }

.modal-actions { display: flex; flex-direction: column; gap: 9px; }

border: none; border-radius: 8px; padding: 14px 16px;

display: flex; align-items: center; justify-content: center; gap: 8px;

border: 1px solid #c8e6c9; border-radius: 8px; padding: 11px 16px;
font-family: ‘DM Sans’, sans-serif; font-size: 0.8rem; font-weight: 500;
cursor: pointer; text-decoration: none; width: 100%;
}

.btn-close {
background: none; border: 1px solid var(–border); border-radius: 8px;
padding: 11px 16px; font-family: ‘DM Sans’, sans-serif; font-size: 0.8rem;
color: var(–muted); cursor: pointer; width: 100%;
}

    afternoon.push('Sylvi', 'Emme');
  }
  return { morning, afternoon, evening: ['Lera', 'Sylvi', 'Emme'] };
}

function interpretWeather(maxTempF, precipProb) {
  if (precipProb >= 50) return { label: 'Rain likely', cls: 'badge-rain', mode: 'rain' };
  if (maxTempF >= HEAT_THRESHOLD) return { label: 'Extreme heat', cls: 'badge-hot', mode: 'hot' };
  if (maxTempF >= 85) return { label: 'Warm', cls: 'badge-normal', mode: 'warm' };
  return { label: 'Good', cls: 'badge-normal', mode: 'good' };
}

// Activity rotation — use dayIndex + blockIndex to vary across week
function getActivityKey(block, mode, dayIndex) {
  const seed = dayIndex * 3 + ['morning','afternoon','evening'].indexOf(block);

  if (mode === 'rain') {
    const pool = ['crafts_home', 'build_play', 'library', 'kidspark', 'jump_zone', 'farmhouse_coffee', 'discovery_village'];
    return pool[seed % pool.length];
  }
  if (mode === 'hot') {
    if (block === 'morning') return seed % 2 === 0 ? 'playground' : 'trail_walk';
    if (block === 'afternoon') return 'pool';
    if (block === 'evening') return seed % 2 === 0 ? 'lake_walk' : 'backyard';
  }
  // Good / warm
  const byBlock = {
    morning:   ['trail_walk', 'playground', 'farm_visit', 'bike_ride', 'crawford_park', 'median_park', 'farmhouse_coffee'],
    afternoon: ['lake_walk', 'sand_volleyball', 'pool', 'picnic_lawn', 'crawford_park', 'playground', 'bike_ride'],
    evening:   ['lake_walk', 'picnic_lawn', 'basketball', 'backyard', 'trail_walk', 'bike_ride', 'sand_volleyball'],
  };
  const pool = byBlock[block];
  return pool[seed % pool.length];
}

// ── Photo fetching ────────────────────────────────────────────────────────
async function fetchPhoto(query) {
  if (photoCache[query]) return photoCache[query];
  try {
    const url = `https://api.unsplash.com/search/photos?query=${encodeURIComponent(query)}&per_page=8&orientation=landscape&client_id=${UNSPLASH_KEY}`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.results && data.results.length > 0) {
      const idx = Math.floor(Math.random() * Math.min(5, data.results.length));
      const photoUrl = data.results[idx].urls.small;
      photoCache[query] = photoUrl;
      return photoUrl;
    }
  } catch(e) {}
  return null;
}

// ── Google Calendar URL builder ───────────────────────────────────────────
function buildCalUrl(title, dateStr, startTime, endTime) {
  // dateStr is "YYYY-MM-DD" -- use directly, no timezone conversion
  const d = dateStr.replace(/-/g, '');
  const start = d + 'T' + startTime.replace(':', '') + '00';
  const end   = d + 'T' + endTime.replace(':', '') + '00';
  const params = new URLSearchParams({
    action: 'TEMPLATE',
    text: title,
    dates: `${start}/${end}`,
  });
  return `https://calendar.google.com/calendar/render?${params.toString()}`;
}

// ── Modal ─────────────────────────────────────────────────────────────────
let currentModalPhoto = null;

function openModal(key, kids, dateStr, block) {
  const a = ACTIVITIES[key];
  if (!a) return;
  const bt = BLOCK_TIMES[block];

  document.getElementById('modal-category').textContent = a.category;
  document.getElementById('modal-title').textContent = a.act;
  document.getElementById('modal-description').textContent = a.description;

  const kidsStr = kids.length > 0 ? 'With: ' + kids.join(', ') : '';
  document.getElementById('modal-kids').textContent = kidsStr;

  // Address
  const addrEl = document.getElementById('modal-address');
  if (a.address === 'Home') {
    addrEl.innerHTML = `<span>📍 Home</span>`;
  } else {
    addrEl.innerHTML = `<span>📍 ${a.address}</span>`;
  }

  // Maps button
  const mapsBtn = document.getElementById('modal-maps-btn');
  if (a.maps) {
    mapsBtn.href = `https://waze.com/ul?q=${a.maps}&navigate=yes`;
    mapsBtn.style.display = 'flex';
  } else {
    mapsBtn.style.display = 'none';
  }

  // Calendar button -- always visible
  const kidsLabel = kids.length === 0 ? '' : kids.length === 1 ? kids[0] : kids.slice(0, -1).join(', ') + ' & ' + kids[kids.length - 1];
  const calTitle = kids.length > 0 ? `${a.act} with ${kidsLabel}` : a.act;
  const calBtn = document.getElementById('modal-cal-btn');
  calBtn.href = buildCalUrl(calTitle, dateStr, bt.start, bt.end);
  calBtn.style.display = 'flex';

  // Photo
  const photoEl = document.getElementById('modal-photo');
  photoEl.style.opacity = '0.3';
  photoEl.src = '';
  fetchPhoto(a.photo).then(url => {
    if (url) {
      photoEl.src = url;
      photoEl.onload = () => { photoEl.style.opacity = '1'; photoEl.style.transition = 'opacity 0.3s'; };
    } else {
      photoEl.style.display = 'none';
    }
  });

  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('open');
  }
}

// ── Main render ───────────────────────────────────────────────────────────
async function loadWeather() {
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max&temperature_unit=fahrenheit&timezone=America%2FChicago&forecast_days=7`;
    const res = await fetch(url);
    if (!res.ok) throw new Error();
    const data = await res.json();
    renderWeek(data);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';

    // Last updated
    const now = new Date();
    const mins = Math.floor((now - now) / 60000); // always 0 on fresh load
    document.getElementById('last-updated').textContent = `Updated just now`;
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
  }
}

function renderWeek(data) {
  const grid = document.getElementById('week-grid');
  const today = new Date(); today.setHours(0,0,0,0);
  const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  const dates = data.daily.time.map(t => new Date(t + 'T00:00:00'));
  document.getElementById('week-range').textContent =
    `${dates[0].toLocaleDateString('en-US',{month:'short',day:'numeric'})} – ${dates[6].toLocaleDateString('en-US',{month:'short',day:'numeric'})}, ${dates[6].getFullYear()}`;

  dates.forEach((date, i) => {
    const maxTemp = Math.round(data.daily.temperature_2m_max[i]);
    const minTemp = Math.round(data.daily.temperature_2m_min[i]);
    const precipProb = data.daily.precipitation_probability_max[i];
    const isToday = date.getTime() === today.getTime();
    const cond = interpretWeather(maxTemp, precipProb);
    const kidsAvail = getKidsAvailable(date);

    const card = document.createElement('div');
    card.className = `day-card${isToday ? ' today' : ''}`;

    const blockDefs = [
      { key: 'morning',   cls: 'block-morning' },
      { key: 'afternoon', cls: 'block-afternoon' },
      { key: 'evening',   cls: 'block-evening' },
    ];

    const blocksHTML = blockDefs.map((b, bi) => {
      const kids = kidsAvail[b.key];
      const bt = BLOCK_TIMES[b.key];
      if (kids.length === 0) {
        return `<div class="time-block ${b.cls}">
          <div class="block-overlay"></div>
          <div class="no-kids">No kids available</div>
        </div>`;
      }
      const actKey = getActivityKey(b.key, cond.mode, i);
      const a = ACTIVITIES[actKey];
      const photoId = `p-${i}-${b.key}`;
      const kidsEncoded = encodeURIComponent(JSON.stringify(kids));
      const dateStr = data.daily.time[i]; // e.g. "2026-03-09"
      return `<div class="time-block ${b.cls}" data-act="${actKey}" data-kids="${kidsEncoded}" data-date="${dateStr}" data-block="${b.key}">
        <img id="${photoId}" class="block-bg-img" data-query="${a.photo}" alt="${a.act}" />
        <div class="block-overlay"></div>
        <div class="block-content">
          <div class="block-label">${bt.label} · ${bt.display}</div>
          <div class="block-kids">${kids.join(', ')}</div>
          <div class="block-activity">${a.act}</div>
          <div class="block-tap-hint">
            <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            Tap for details
          </div>
        </div>
      </div>`;
    }).join('');

    card.innerHTML = `
      <div class="day-header">
        <div class="day-name">${DAY_NAMES[date.getDay()]}${isToday ? ' — Today' : ''}</div>
        <div class="day-date">${MONTH_NAMES[date.getMonth()]} ${date.getDate()}</div>
      </div>
      <div class="day-weather">
        <div>
          <div class="temp-range">${maxTemp}° <span>/ ${minTemp}°F</span></div>
          ${precipProb > 20 ? `<div class="rain-pct">${precipProb}% rain</div>` : ''}
        </div>
        <div class="condition-badge ${cond.cls}">${cond.label}</div>
      </div>
      <div class="blocks">${blocksHTML}</div>`;

    grid.appendChild(card);
  });

  // Load photos async
  document.querySelectorAll('.block-bg-img[data-query]').forEach(async img => {
    const url = await fetchPhoto(img.getAttribute('data-query'));
    if (url) { img.src = url; img.onload = () => img.classList.add('loaded'); }
  });

  // Attach tap handlers via event delegation (iOS Safari safe)
  document.getElementById('week-grid').addEventListener('click', function(e) {
    const block = e.target.closest('.time-block[data-act]');
    if (!block) return;
    const actKey = block.getAttribute('data-act');
    const kids = JSON.parse(decodeURIComponent(block.getAttribute('data-kids')));
    const dateStr = block.getAttribute('data-date');
    const blockKey = block.getAttribute('data-block');
    openModal(actKey, kids, dateStr, blockKey);
  });
}

// ── Swipe to dismiss modal ────────────────────────────────────────────────
(function() {
  let startY = 0;
  let isDragging = false;
  const modal = document.getElementById('modal');
  const handle = modal.querySelector('.modal-handle');
  const overlay = document.getElementById('modal-overlay');

  handle.addEventListener('touchstart', function(e) {
    startY = e.touches[0].clientY;
    isDragging = true;
    modal.style.transition = 'none';
  }, { passive: true });

  handle.addEventListener('touchmove', function(e) {
    if (!isDragging) return;
    const delta = e.touches[0].clientY - startY;
    if (delta > 0) {
      modal.style.transform = `translateY(${delta}px)`;
    }
  }, { passive: true });

  handle.addEventListener('touchend', function(e) {
    if (!isDragging) return;
    isDragging = false;
    const delta = e.changedTouches[0].clientY - startY;
    modal.style.transition = 'transform 0.25s ease';
    if (delta > 80) {
      modal.style.transform = 'translateY(100%)';
      setTimeout(() => {
        overlay.classList.remove('open');
        modal.style.transform = '';
        modal.style.transition = '';
      }, 250);
    } else {
      modal.style.transform = '';
    }
  }, { passive: true });
})();

loadWeather();

// Swipe down to dismiss modal
(function() {
  const modal = document.getElementById('modal');
  const overlay = document.getElementById('modal-overlay');
  let startY = 0;
  let currentY = 0;
  let isDragging = false;

  modal.addEventListener('touchstart', function(e) {
    startY = e.touches[0].clientY;
    isDragging = true;
    modal.style.transition = 'none';
  }, { passive: true });

  modal.addEventListener('touchmove', function(e) {
    if (!isDragging) return;
    currentY = e.touches[0].clientY;
    const diff = currentY - startY;
    if (diff > 0) {
      modal.style.transform = `translateY(${diff}px)`;
    }
  }, { passive: true });

  modal.addEventListener('touchend', function() {
    isDragging = false;
    modal.style.transition = 'transform 0.25s ease';
    const diff = currentY - startY;
    if (diff > 80) {
      overlay.classList.remove('open');
    }
    modal.style.transform = '';
  });
})();
</script>
